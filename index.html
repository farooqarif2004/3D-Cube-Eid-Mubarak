<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 2026</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; cursor: pointer; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; z-index: 10;
        }

        #eid-wish { 
            font-size: 5.5em; color: #ffd700; opacity: 0; letter-spacing: 15px; text-transform: uppercase;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ffaa00; font-weight: bold;
            transition: all 1s ease-out; transform: scale(0.5);
        }
        
        #instructions {
            position: absolute; bottom: 40px; color: #ffd700; font-size: 1.3em;
            letter-spacing: 2px; text-transform: uppercase; opacity: 0.8;
            transition: opacity 0.5s ease;
        }

        body.exploded #eid-wish { opacity: 1; transform: scale(1); }
        body.exploded #instructions { opacity: 0; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 id="eid-wish">EID MUBARAK</h1>
        <p id="instructions">CLICK THE CUBE TO CELEBRATE</p>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // 1. Explosion & State Logic
        let isExploded = false;
        let explosionStartTime = 0;
        const facesGroup = new THREE.Group();
        scene.add(facesGroup);

        function createSharpFace(mainText, subIcon) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 512;
            ctx.fillStyle = '#111111'; ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 25; ctx.strokeRect(20, 20, 472, 472);
            ctx.textAlign = 'center'; ctx.fillStyle = '#ffd700';
            ctx.font = '180px Arial'; ctx.fillText(subIcon, 256, 280);
            ctx.font = 'bold 85px Arial'; ctx.fillText(mainText, 256, 440);
            return new THREE.CanvasTexture(canvas);
        }

        const faceConfigs = [
            { txt: 'EID', icon: '🌙' }, { txt: 'EID', icon: '✨' },      
            { txt: 'MUBARAK', icon: '🕌' }, { txt: 'MUBARAK', icon: '⭐' },      
            { txt: '2026', icon: '🌙' }, { txt: '2026', icon: '🕌' }      
        ];

        const faces = [];
        const faceGeometry = new THREE.PlaneGeometry(3.5, 3.5);
        const faceLayout = [
            { pos: [0, 0, 1.75], rot: [0, 0, 0] },
            { pos: [0, 0, -1.75], rot: [0, Math.PI, 0] },
            { pos: [0, 1.75, 0], rot: [-Math.PI / 2, 0, 0] },
            { pos: [0, -1.75, 0], rot: [Math.PI / 2, 0, 0] },
            { pos: [1.75, 0, 0], rot: [0, Math.PI / 2, 0] },
            { pos: [-1.75, 0, 0], rot: [0, -Math.PI / 2, 0] }
        ];

        faceLayout.forEach((layout, i) => {
            const mat = new THREE.MeshBasicMaterial({ 
                map: createSharpFace(faceConfigs[i].txt, faceConfigs[i].icon), 
                transparent: true, side: THREE.DoubleSide 
            });
            const face = new THREE.Mesh(faceGeometry, mat);
            face.position.set(...layout.pos);
            face.rotation.set(...layout.rot);
            face.userData.initialPos = [...layout.pos];
            face.userData.initialRot = [...layout.rot]; 
            facesGroup.add(face);
            faces.push(face);
        });

        // 2. THE MOON (Back Left)
        const moonCanvas = document.createElement('canvas');
        moonCanvas.width = 256; moonCanvas.height = 256;
        const mCtx = moonCanvas.getContext('2d');
        mCtx.fillStyle = '#ffd700'; mCtx.shadowBlur = 50; mCtx.shadowColor = '#ffd700';
        mCtx.beginPath(); mCtx.arc(128, 128, 100, 0, Math.PI * 2); mCtx.fill();
        mCtx.globalCompositeOperation = 'destination-out';
        mCtx.beginPath(); mCtx.arc(170, 100, 100, 0, Math.PI * 2); mCtx.fill();
        const moon = new THREE.Mesh(new THREE.PlaneGeometry(8.5, 8.5), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(moonCanvas), transparent: true }));
        moon.position.set(-16, 6, -15);
        scene.add(moon);

        // 3. ENHANCED AESTHETIC STARS (Image_7 Style)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 4500;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i < starCount * 3; i+=3) {
            starPos[i] = (Math.random() - 0.5) * 100;
            starPos[i+1] = (Math.random() - 0.5) * 100;
            starPos[i+2] = (Math.random() - 0.5) * 60 - 20; 
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.06, transparent: true, depthWrite: false});
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // 4. Click Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            if (isExploded) { resetCube(); return; }
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.intersectObjects(faces).length > 0) {
                isExploded = true;
                explosionStartTime = Date.now();
                document.body.classList.add('exploded');
                faces.forEach(f => {
                    f.userData.v = new THREE.Vector3((Math.random()-0.5)*18, (Math.random()-0.5)*18, (Math.random()-0.5)*18);
                    f.userData.rv = new THREE.Vector3(Math.random()*5, Math.random()*5, Math.random()*5);
                });
            }
        });

        function resetCube() {
            isExploded = false;
            document.body.classList.remove('exploded');
            faces.forEach((f, i) => {
                f.position.set(...f.userData.initialPos);
                f.rotation.set(...f.userData.initialRot);
                f.material.opacity = 1.0;
            });
            facesGroup.rotation.set(0, 0, 0);
        }

        // 5. Animation Loop
        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);
            if (!lastTime) lastTime = currentTime;
            const deltaTime = (currentTime - lastTime) * 0.001;
            lastTime = currentTime;

            if (!isExploded) {
                facesGroup.rotation.x += 0.5 * deltaTime;
                facesGroup.rotation.y += 0.7 * deltaTime;
                facesGroup.position.y = Math.sin(currentTime * 0.0015) * 0.3;
                starMat.opacity = 0.6 + Math.sin(currentTime * 0.003) * 0.4; // Twinkling
            } else {
                const elapsed = Date.now() - explosionStartTime;
                const progress = Math.min(elapsed / 1000, 1.0);
                faces.forEach(f => {
                    f.position.addScaledVector(f.userData.v, deltaTime);
                    f.rotation.x += f.userData.rv.x * deltaTime;
                    f.material.opacity = Math.max(1.0 - progress * 1.5, 0);
                });
            }
            stars.rotation.z += 0.01 * deltaTime; // Slow drift
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
